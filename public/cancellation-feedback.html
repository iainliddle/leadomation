<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanks for your feedback | Leadomation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #F9FAFB; font-family: Inter, system-ui, sans-serif; padding: 2rem; }
  .card { max-width: 440px; width: 100%; padding: 2.5rem 2rem; background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); text-align: center; }
  .logo { height: 40px; margin-bottom: 2rem; }
  .emoji { font-size: 3rem; margin-bottom: 1rem; }
  h1 { font-size: 1.5rem; font-weight: 900; color: #111827; margin-bottom: 0.75rem; }
  .subtitle { font-size: 0.875rem; color: #6B7280; line-height: 1.6; margin-bottom: 0.5rem; }
  .reason { font-size: 0.8rem; color: #9CA3AF; margin-bottom: 1.5rem; }
  .note { font-size: 0.8rem; color: #9CA3AF; margin-bottom: 2rem; }
  .btn { display: inline-block; padding: 0.875rem 2rem; background: #4F46E5; color: white; border-radius: 0.75rem; font-weight: 800; font-size: 0.875rem; text-decoration: none; }
</style>
</head>
<body>
<img src="/assets/logo-full-CtvVA_AY.png" alt="Leadomation" class="logo">
<div class="card">
  <div class="emoji">💙</div>
  <h1>Thanks for letting us know</h1>
  <p class="subtitle">We're sorry to see you go. Your feedback helps us improve Leadomation for everyone.</p>
  <p class="reason" id="reason-text"></p>
  <p class="note">Your subscription has been cancelled. You can still access your account until the end of your billing period.</p>
  <a href="https://www.leadomation.co.uk/register" class="btn">Reactivate Your Account</a>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const reason = params.get('reason');
const userId = params.get('userId');
const labels = {
  too_expensive: 'Too expensive',
  missing_features: 'Missing features I needed',
  too_complicated: 'Too complicated to use',
  no_longer_needed: 'No longer needed'
};
if (reason && labels[reason]) {
  document.getElementById('reason-text').textContent = 'Reason: ' + labels[reason];
}
if (reason && userId && userId !== 'test') {
  fetch('/api/cancellation-reason', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-secret': 'leadomation-cancel-2026' },
    body: JSON.stringify({ userId, reason })
  }).catch(console.error);
}
</script>
</body>
</html>
